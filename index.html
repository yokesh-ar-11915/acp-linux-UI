<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Control Plus</title>
  <link rel="stylesheet" href="css/style.css?v=8" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">
        <span class="brand-icon"><i class="fa-solid fa-shield-halved"></i></span>
        <span class="brand-text">Application Control Plus</span>
      </div>
    </div>
    <nav class="topbar-nav" id="topNav">
      <a href="#overview" class="topnav-item active" data-module="overview">Overview</a>
      <a href="#manage" class="topnav-item" data-module="manage">Manage</a>
      <a href="#policies" class="topnav-item" data-module="policies">Policies</a>
      <a href="#insight" class="topnav-item" data-module="insight">Insight</a>
      <a href="#reports" class="topnav-item" data-module="reports">Reports</a>
      <a href="#settings" class="topnav-item" data-module="settings">Settings</a>
      <div class="topnav-overflow" id="overflowBtn">
        <span class="overflow-dots">•••</span>
        <div class="overflow-menu" id="overflowMenu">
        </div>
      </div>
    </nav>
    <div class="topbar-right">
      <a href="#" class="trial-btn">Start your 30 days free trial</a>
      <a href="#" class="jump-sdp"><i class="fa fa-building"></i> Jump to SDP</a>
      <div class="topbar-action" title="Search"><i class="fa fa-search"></i></div>
      <div class="topbar-action" title="Notifications"><i class="fa fa-bell"></i></div>
      <div class="topbar-action" title="What's New"><i class="fa fa-bolt"></i></div>
      <div class="topbar-action user-avatar" id="userMenu">
        <i class="fa fa-user-circle"></i>
        <div class="user-dropdown" id="userDropdown">
          <a href="#"><i class="fa fa-user"></i> My Profile</a>
          <a href="#"><i class="fa fa-key"></i> Change Password</a>
          <hr />
          <a href="#"><i class="fa fa-sign-out-alt"></i> Logout</a>
        </div>
      </div>
      <div class="topbar-action" title="Apps"><i class="fa fa-th"></i></div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="main-wrapper">
    <!-- SIDEBAR (hidden for some modules) -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <button class="sidebar-collapse-btn" id="sidebarCollapseBtn"><i class="fa fa-angle-double-left"></i></button>
    </aside>

    <!-- CONTENT -->
    <main class="content" id="pageContent"></main>
  </div>

  <!-- FOOTER -->
  <footer class="app-footer" id="appFooter">
    &copy; 2026 Zoho Corporation Private Limited. All rights reserved.
  </footer>

  <!-- CHAT BUTTON -->
  <div class="chat-fab" title="Chat"><i class="fa fa-bars"></i></div>

  <script src="js/menu.js?v=8"></script>
  <script src="js/pages.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
</body>
</html>
